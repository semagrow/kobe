apiVersion: kobe.semagrow.org/v1alpha1
kind: Experiment
metadata:
  name: gssbench-exp-geo-poly
spec:
  benchmark: gssbench
  federatorName: semagrow-geo-poly
  federatorTemplateRef: semagrowtemplate-geo-poly
  evaluator:
    image: semagrow/kobe-sequential-evaluator
    env:
     - name: TIMEOUT
       value: "300000"
  timesToRun: 3
  dryRun: false
  forceNewInit: false 

